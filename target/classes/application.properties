# -----------------------------------------------------------
# MySQL Database Configuration
# -----------------------------------------------------------
spring.application.name=crypto-vault
# spring.datasource.url=jdbc:mysql://localhost:3306/cryptovault_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=jevin8056

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true




# -----------------------------------------------------------
# File Upload Configuration
# -----------------------------------------------------------
# Max file size for a single upload (10MB)
spring.servlet.multipart.max-file-size=10MB
# Max total request size for a multipart request
spring.servlet.multipart.max-request-size=10MB

# Custom property for file storage path
file.upload-dir=./uploads
